version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-mgask_staging}
      - POSTGRES_USER=${DB_USER:-mgask_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ${APP_IMAGE}
    command: gunicorn zthob.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - /home/mgask-2025-c03d7f556e66.json:/home/mgask-2025-c03d7f556e66.json:ro
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db  # Points to the Docker 'db' service
      - APP_ENV=staging
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    image: ${APP_IMAGE}
    command: celery -A zthob worker -l info
    volumes:
      - /home/mgask-2025-c03d7f556e66.json:/home/mgask-2025-c03d7f556e66.json:ro
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  staging_postgres_data:
  redis_data:
