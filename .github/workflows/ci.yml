name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        env:
          APP_ENV: staging
          DEBUG: "False"
          DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: python manage.py check

      - name: Check for missing migrations
        env:
          APP_ENV: staging
          DEBUG: "False"
          DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations and verify migration plan
        env:
          APP_ENV: staging
          DEBUG: "False"
          DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: |
          set -euo pipefail
          python manage.py migrate --noinput
          if python manage.py showmigrations --plan | grep -q '^\[ \]'; then
            echo "::error::Unapplied migrations remain after migrate"
            python manage.py showmigrations --plan | grep '^\[ \]' || true
            exit 1
          fi

      - name: Run focused tests
        env:
          APP_ENV: staging
          DEBUG: "False"
          DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: python manage.py test apps.orders.tests_checkout_flow apps.orders.tests_cod_flow apps.notifications.tests
