name: Deploy Staging

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "APP_IMAGE=${repo}:${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          echo "APP_IMAGE_ALIAS=${repo}:staging" >> "$GITHUB_ENV"

      - name: Set deployment metadata
        run: |
          echo "GIT_COMMIT=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          echo "GIT_BRANCH=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_ENV"
          echo "GIT_COMMIT_DATE=$(git log -1 --format=%cI)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}
            ${{ env.APP_IMAGE_ALIAS }}
          build-args: |
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            GIT_BRANCH=${{ env.GIT_BRANCH }}
            GIT_COMMIT_DATE=${{ env.GIT_COMMIT_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for name in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is missing for the staging environment"
              exit 1
            fi
          done

          if ! [[ "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::SSH_PORT must be numeric"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Checking SSH TCP connectivity for staging server..."
          if ! nc -4 -vz -w 20 "$SSH_HOST" "$SSH_PORT"; then
            echo "::error::Cannot reach SSH_HOST on SSH_PORT from the GitHub runner. Check DNS, port, server firewall/security group, and whether GitHub-hosted runner IPs are allowed."
            exit 1
          fi

          echo "Scanning SSH host key for staging server..."
          if ! ssh-keyscan -4 -H -T 20 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            echo "::error::ssh-keyscan failed. Check SSH_HOST, SSH_PORT, firewall, and whether the server allows GitHub-hosted runners."
            cat ssh-keyscan.err
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" "echo ssh-ok"

      - name: Deploy staging
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::error::GHCR_TOKEN secret is missing for the staging environment"
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s <<EOF
          $(printf 'export APP_IMAGE=%q\n' "$APP_IMAGE")
          $(printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME")
          $(printf 'export GHCR_TOKEN=%q\n' "$GHCR_TOKEN")
          set -euo pipefail
          cd /home/mgask-staging
          git fetch origin
          if ! git reset --hard origin/main; then
            echo "::error::git reset failed. Run on server as root: chown -R deploy:deploy /home/mgask-staging"
            exit 1
          fi
          COMPOSE="docker compose -f docker-compose.staging.yml"
          printf '%s' "\$GHCR_TOKEN" | docker login ghcr.io -u "\$GHCR_USERNAME" --password-stdin
          echo "--- pulling images ---"
          \$COMPOSE pull web celery_worker
          pulled_image_id="\$(docker image inspect --format='{{.Id}}' "\$APP_IMAGE")"
          echo "pulled_image_id=\$pulled_image_id"
          echo "--- migration plan ---"
          \$COMPOSE run --rm web python manage.py migrate --plan
          echo "--- running migrations (new image, before recreate) ---"
          \$COMPOSE run --rm web python manage.py migrate --noinput
          echo "--- replacing app containers ---"
          \$COMPOSE stop web celery_worker || true
          \$COMPOSE rm -f web celery_worker || true
          \$COMPOSE up -d --pull always --force-recreate --remove-orphans web celery_worker
          running_container_id="\$(\$COMPOSE ps -q web | head -n1)"
          running_image_id="\$(docker inspect --format='{{.Image}}' "\$running_container_id")"
          echo "running_image_id=\$running_image_id"
          if [ "\$running_image_id" != "\$pulled_image_id" ]; then
            echo "::error::web container is not running the pulled image"
            docker inspect "\$running_container_id" --format='Created={{.Created}} ConfigImage={{.Config.Image}}'
            exit 1
          fi
          echo "--- collectstatic ---"
          \$COMPOSE exec -T web python manage.py collectstatic --noinput
          \$COMPOSE ps
          EOF
