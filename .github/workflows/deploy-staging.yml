name: Deploy Staging

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "APP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:staging" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.APP_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for name in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is missing for the staging environment"
              exit 1
            fi
          done

          if ! [[ "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::SSH_PORT must be numeric"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Checking SSH TCP connectivity for staging server..."
          if ! nc -4 -vz -w 20 "$SSH_HOST" "$SSH_PORT"; then
            echo "::error::Cannot reach SSH_HOST on SSH_PORT from the GitHub runner. Check DNS, port, server firewall/security group, and whether GitHub-hosted runner IPs are allowed."
            exit 1
          fi

          echo "Scanning SSH host key for staging server..."
          if ! ssh-keyscan -4 -H -T 20 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            echo "::error::ssh-keyscan failed. Check SSH_HOST, SSH_PORT, firewall, and whether the server allows GitHub-hosted runners."
            cat ssh-keyscan.err
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" "echo ssh-ok"

      - name: Deploy staging
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::error::GHCR_TOKEN secret is missing for the staging environment"
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "export APP_IMAGE='$APP_IMAGE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN'; bash -s" <<'EOF'
            set -e
            cd /home/mgask-staging
            git fetch origin
            git reset --hard origin/main
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.staging.yml pull web celery_worker
            docker compose -f docker-compose.staging.yml up -d web celery_worker
            docker compose -f docker-compose.staging.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.staging.yml exec -T web python manage.py collectstatic --noinput
            docker compose -f docker-compose.staging.yml restart web celery_worker
            docker compose -f docker-compose.staging.yml ps
          EOF
