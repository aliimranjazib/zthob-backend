name: Deploy Staging

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy staging
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            set -e
            cd /home/mgask-staging
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.staging.yml up -d --build
            docker compose -f docker-compose.staging.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.staging.yml exec -T web python manage.py collectstatic --noinput
            docker compose -f docker-compose.staging.yml restart web celery_worker
            docker compose -f docker-compose.staging.yml ps
          '
