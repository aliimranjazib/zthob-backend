name: Deploy to Staging

on:
  push:
    branches: [ main ]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to staging via Docker
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        ssh -o StrictHostKeyChecking=no root@69.62.126.95 '
          cd /home/mgask-staging
          git fetch origin
          git reset --hard origin/main
          
          echo "🚀 Launching Staging via Docker..."
          docker compose -f docker-compose.staging.yml up -d --build
          
          echo "🗄️ Running migrations..."
          docker compose -f docker-compose.staging.yml exec -T web python manage.py migrate
          
          echo "📁 Collecting static files..."
          docker compose -f docker-compose.staging.yml exec -T web python manage.py collectstatic --noinput
          
          echo "✅ Staging deployment successful!"
        '
