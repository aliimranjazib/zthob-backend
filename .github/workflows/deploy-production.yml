name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "APP_IMAGE=${repo}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "APP_IMAGE_ALIAS=${repo}:production" >> "$GITHUB_ENV"

      - name: Set deployment metadata
        run: |
          echo "GIT_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "GIT_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "GIT_COMMIT_DATE=$(git log -1 --format=%cI)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}
            ${{ env.APP_IMAGE_ALIAS }}
          build-args: |
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            GIT_BRANCH=${{ env.GIT_BRANCH }}
            GIT_COMMIT_DATE=${{ env.GIT_COMMIT_DATE }}

      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for name in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is missing for the production environment"
              exit 1
            fi
          done

          if ! [[ "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::SSH_PORT must be numeric"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          if ! nc -4 -vz -w 20 "$SSH_HOST" "$SSH_PORT"; then
            echo "::error::Cannot reach SSH_HOST on SSH_PORT"
            exit 1
          fi

          if ! ssh-keyscan -4 -H -T 20 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            echo "::error::ssh-keyscan failed"
            cat ssh-keyscan.err
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" "echo ssh-ok"

      - name: Deploy production
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}
          EXPECTED_GIT_COMMIT: ${{ env.GIT_COMMIT }}
          GIT_BRANCH: ${{ env.GIT_BRANCH }}
          GIT_COMMIT_DATE: ${{ env.GIT_COMMIT_DATE }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::error::GHCR_TOKEN secret is missing for the production environment"
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s <<REMOTE
          export APP_IMAGE=$(printf %q "$APP_IMAGE")
          export EXPECTED_GIT_COMMIT=$(printf %q "$EXPECTED_GIT_COMMIT")
          export GIT_BRANCH=$(printf %q "$GIT_BRANCH")
          export GIT_COMMIT_DATE=$(printf %q "$GIT_COMMIT_DATE")
          export GHCR_USERNAME=$(printf %q "$GHCR_USERNAME")
          export GHCR_TOKEN=$(printf %q "$GHCR_TOKEN")
          set -euo pipefail
          cd /home/mgask-production
          git fetch origin
          if ! git reset --hard origin/main; then
            echo "::error::git reset failed. Run as root: chown -R deploy:deploy /home/mgask-production"
            exit 1
          fi
          chmod +x scripts/deploy-production-remote.sh
          exec ./scripts/deploy-production-remote.sh
          REMOTE

      - name: Verify production endpoint
        env:
          EXPECTED_GIT_COMMIT: ${{ env.GIT_COMMIT }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          response="$(curl -fsS https://prod.mgask.net/api/config/version/)"
          echo "$response"
          python -c "import json, os, sys; data = json.load(sys.stdin)['data']; expected = os.environ['EXPECTED_GIT_COMMIT']; ok = data.get('full_commit_hash') == expected and data.get('app_env') == 'production'; print('expected=', expected); print('actual=', data.get('full_commit_hash')); raise SystemExit(0 if ok else 1)" <<< "$response"
