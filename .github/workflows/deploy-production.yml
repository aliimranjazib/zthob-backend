name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "APP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:production" >> "$GITHUB_ENV"

      - name: Set deployment metadata
        run: |
          echo "GIT_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "GIT_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "GIT_COMMIT_DATE=$(git log -1 --format=%cI)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}
            ${{ env.APP_IMAGE }}-${{ env.GIT_COMMIT }}
          build-args: |
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            GIT_BRANCH=${{ env.GIT_BRANCH }}
            GIT_COMMIT_DATE=${{ env.GIT_COMMIT_DATE }}

      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for name in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is missing for the production environment"
              exit 1
            fi
          done

          if ! [[ "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::SSH_PORT must be numeric"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Checking SSH TCP connectivity for production server..."
          if ! nc -4 -vz -w 20 "$SSH_HOST" "$SSH_PORT"; then
            echo "::error::Cannot reach SSH_HOST on SSH_PORT from the GitHub runner. Check DNS, port, server firewall/security group, and whether GitHub-hosted runner IPs are allowed."
            exit 1
          fi

          echo "Scanning SSH host key for production server..."
          if ! ssh-keyscan -4 -H -T 20 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            echo "::error::ssh-keyscan failed. Check SSH_HOST, SSH_PORT, firewall, and whether the server allows GitHub-hosted runners."
            cat ssh-keyscan.err
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" "echo ssh-ok"

      - name: Deploy production
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}
          EXPECTED_GIT_COMMIT: ${{ env.GIT_COMMIT }}
          GIT_BRANCH: ${{ env.GIT_BRANCH }}
          GIT_COMMIT_DATE: ${{ env.GIT_COMMIT_DATE }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::error::GHCR_TOKEN secret is missing for the production environment"
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "export APP_IMAGE='$APP_IMAGE' EXPECTED_GIT_COMMIT='$EXPECTED_GIT_COMMIT' GIT_BRANCH='$GIT_BRANCH' GIT_COMMIT_DATE='$GIT_COMMIT_DATE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN'; bash -s" <<'EOF'
            set -euo pipefail
            cd /home/mgask-production
            mkdir -p backups
            docker compose -f docker-compose.production.yml exec -T db sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' > backups/backup_$(date +%F_%H-%M).sql
            git fetch origin
            git reset --hard origin/main
            if [ -f .env ]; then
              grep -v -E '^(GIT_COMMIT|GIT_BRANCH|GIT_COMMIT_DATE|APP_IMAGE)=' .env > .env.tmp || true
              mv .env.tmp .env
            fi
            COMMIT_IMAGE="${APP_IMAGE}-${EXPECTED_GIT_COMMIT}"
            export GIT_COMMIT="$EXPECTED_GIT_COMMIT"
            export APP_IMAGE="$COMMIT_IMAGE"
            printf 'GIT_COMMIT=%s\nGIT_BRANCH=%s\nGIT_COMMIT_DATE=%s\nAPP_IMAGE=%s\n' \
              "$GIT_COMMIT" "$GIT_BRANCH" "$GIT_COMMIT_DATE" "$APP_IMAGE" > deployment.env
            echo "--- deployment.env ---"
            cat deployment.env
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$APP_IMAGE"
            docker image inspect "$APP_IMAGE" --format 'image_id={{.Id}} created={{.Created}}'
            COMPOSE="docker compose --env-file deployment.env -f docker-compose.production.yml"
            $COMPOSE pull web celery_worker
            $COMPOSE stop web celery_worker
            $COMPOSE rm -f web celery_worker
            $COMPOSE up -d --pull always --force-recreate --remove-orphans web celery_worker
            $COMPOSE ps
            echo "--- container GIT_* env ---"
            $COMPOSE exec -T web /bin/sh -c 'env | grep -E "^GIT_" || true'
            $COMPOSE exec -T web python manage.py migrate
            $COMPOSE exec -T web python manage.py collectstatic --noinput
            $COMPOSE exec -T -e EXPECTED_GIT_COMMIT="$EXPECTED_GIT_COMMIT" web python manage.py shell -c "import os; from apps.core.version import get_git_info; info = get_git_info(); print(info); raise SystemExit(0 if info.get('full_commit_hash') == os.environ['EXPECTED_GIT_COMMIT'] else 1)"
            $COMPOSE ps
          EOF

      - name: Verify production endpoint
        env:
          EXPECTED_GIT_COMMIT: ${{ env.GIT_COMMIT }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          echo "Production server-local diagnostics:"
          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "export EXPECTED_GIT_COMMIT='$EXPECTED_GIT_COMMIT'; bash -s" <<'EOF'
            set -euo pipefail
            cd /home/mgask-production
            COMPOSE="docker compose --env-file deployment.env -f docker-compose.production.yml"
            echo "--- deployment.env ---"
            cat deployment.env || true
            echo "--- docker compose ps ---"
            $COMPOSE ps
            echo "--- container deployment metadata ---"
            $COMPOSE exec -T -e EXPECTED_GIT_COMMIT="$EXPECTED_GIT_COMMIT" web python manage.py shell -c "from apps.core.version import get_git_info; print(get_git_info())"
            echo "--- container GIT_* env ---"
            $COMPOSE exec -T web /bin/sh -c 'env | grep -E "^GIT_" || true'
            echo "--- host-local production port response ---"
            curl -fsS http://127.0.0.1:8000/api/config/version/ || true
            echo
          EOF

          echo "Public production endpoint response:"
          response="$(curl -fsS https://prod.mgask.net/api/config/version/)"
          echo "$response"
          python -c "import json, os, sys; data = json.load(sys.stdin)['data']; expected = os.environ['EXPECTED_GIT_COMMIT']; ok = data.get('full_commit_hash') == expected and data.get('app_env') == 'production'; print('expected_full_commit_hash=', expected); print('actual_full_commit_hash=', data.get('full_commit_hash')); print('actual_app_env=', data.get('app_env')); raise SystemExit(0 if ok else 1)" <<< "$response"
