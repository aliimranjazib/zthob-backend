name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "APP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:production" >> "$GITHUB_ENV"

      - name: Set deployment metadata
        run: |
          echo "GIT_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "GIT_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "GIT_COMMIT_DATE=$(git log -1 --format=%cI)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.APP_IMAGE }}
          build-args: |
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            GIT_BRANCH=${{ env.GIT_BRANCH }}
            GIT_COMMIT_DATE=${{ env.GIT_COMMIT_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for name in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is missing for the production environment"
              exit 1
            fi
          done

          if ! [[ "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "::error::SSH_PORT must be numeric"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Checking SSH TCP connectivity for production server..."
          if ! nc -4 -vz -w 20 "$SSH_HOST" "$SSH_PORT"; then
            echo "::error::Cannot reach SSH_HOST on SSH_PORT from the GitHub runner. Check DNS, port, server firewall/security group, and whether GitHub-hosted runner IPs are allowed."
            exit 1
          fi

          echo "Scanning SSH host key for production server..."
          if ! ssh-keyscan -4 -H -T 20 -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            echo "::error::ssh-keyscan failed. Check SSH_HOST, SSH_PORT, firewall, and whether the server allows GitHub-hosted runners."
            cat ssh-keyscan.err
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" "echo ssh-ok"

      - name: Deploy production
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}
          EXPECTED_GIT_COMMIT: ${{ env.GIT_COMMIT }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::error::GHCR_TOKEN secret is missing for the production environment"
            exit 1
          fi

          ssh -4 -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "export APP_IMAGE='$APP_IMAGE' EXPECTED_GIT_COMMIT='$EXPECTED_GIT_COMMIT' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN'; bash -s" <<'EOF'
            set -euo pipefail
            cd /home/mgask-production
            mkdir -p backups
            docker compose -f docker-compose.production.yml exec -T db sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' > backups/backup_$(date +%F_%H-%M).sql
            git fetch origin
            git reset --hard origin/main
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.production.yml pull web celery_worker
            docker compose -f docker-compose.production.yml up -d --force-recreate --remove-orphans web celery_worker
            docker compose -f docker-compose.production.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.production.yml exec -T web python manage.py collectstatic --noinput
            docker compose -f docker-compose.production.yml restart web celery_worker
            docker compose -f docker-compose.production.yml exec -T -e EXPECTED_GIT_COMMIT="$EXPECTED_GIT_COMMIT" web python manage.py shell -c "import os; from apps.core.version import get_git_info; info = get_git_info(); print(info); raise SystemExit(0 if info.get('full_commit_hash') == os.environ['EXPECTED_GIT_COMMIT'] else 1)"
            docker compose -f docker-compose.production.yml ps
          EOF

      - name: Verify production endpoint
        env:
          EXPECTED_GIT_COMMIT: ${{ env.GIT_COMMIT }}
        run: |
          set -euo pipefail
          response="$(curl -fsS https://prod.mgask.net/api/config/version/)"
          echo "$response"
          python -c "import json, os, sys; data = json.load(sys.stdin)['data']; expected = os.environ['EXPECTED_GIT_COMMIT']; ok = data.get('full_commit_hash') == expected and data.get('app_env') == 'production'; raise SystemExit(0 if ok else 1)" <<< "$response"
