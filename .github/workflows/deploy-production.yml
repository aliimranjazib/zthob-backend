name: Deploy to Production

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to production via Docker
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        ssh -o StrictHostKeyChecking=no root@69.62.126.95 '
          cd /home/mgask-production
          git fetch origin
          git reset --hard origin/main
          
          echo "💾 Creating database backup..."
          # Backup the Dockerized DB
          timestamp=$(date +%Y%m%d_%H%M%S)
          docker compose -f docker-compose.production.yml exec -T db pg_dump -U mgask_user -d mgask > /home/mgask-production/backups/backup_${timestamp}.sql || echo "Backup warning"
          
          echo "🚀 Launching Production via Docker..."
          docker compose -f docker-compose.production.yml up -d --build
          
          echo "🗄️ Running migrations..."
          docker compose -f docker-compose.production.yml exec -T web python manage.py migrate
          
          echo "📁 Collecting static files..."
          docker compose -f docker-compose.production.yml exec -T web python manage.py collectstatic --noinput
          
          echo "✅ Production deployment successful!"
        '
