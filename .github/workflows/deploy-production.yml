name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy production
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            set -e
            cd /home/mgask-production
            mkdir -p backups
            docker compose -f docker-compose.production.yml exec -T db sh -c '\''pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"'\'' > backups/backup_$(date +%F_%H-%M).sql
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.production.yml up -d --build
            docker compose -f docker-compose.production.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.production.yml exec -T web python manage.py collectstatic --noinput
            docker compose -f docker-compose.production.yml restart web celery_worker
            docker compose -f docker-compose.production.yml ps
          '
